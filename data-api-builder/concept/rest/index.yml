### YamlMime:Landing

title: REST API in Data API builder
summary: Data API builder exposes database objects as RESTful endpoints with built-in filtering, sorting, pagination, and OpenAPI support. Use standard HTTP methods to create, read, update, and delete records from tables, views, and stored procedures.
