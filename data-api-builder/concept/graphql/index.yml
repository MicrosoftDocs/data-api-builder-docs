### YamlMime:Landing

title: GraphQL API in Data API builder
summary: Data API builder exposes database objects as a fully typed GraphQL schema with queries, mutations, relationships, and aggregation. Traverse related entities in a single request, insert multiple records atomically, and call stored procedures through a unified endpoint.
