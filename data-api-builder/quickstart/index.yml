### YamlMime:Landing

title: Data API builder quickstarts
summary: Get up and running with Data API builder in minutes. Each quickstart uses Docker to run a local database and walks you through creating REST or GraphQL API endpoints with the DAB CLI.

metadata:
  title: Data API builder quickstarts
  description: Quickstart guides for using Data API builder with SQL Server, Azure SQL, PostgreSQL, MySQL, Azure Cosmos DB for NoSQL, Azure Cosmos DB for PostgreSQL, Microsoft Fabric SQL, and Azure Synapse Analytics.
  author: seesharprun
  ms.author: sidandrews
  ms.reviewer: jerrynixon
  ms.service: data-api-builder
  ms.topic: landing-page
  ms.date: 03/30/2026

