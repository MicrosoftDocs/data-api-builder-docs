### YamlMime:Hub

title: Data API builder documentation
summary: >
  Data API builder generates REST and GraphQL endpoints for your databases, including SQL Server, Azure SQL,
  Azure Cosmos DB, PostgreSQL, and MySQL. It also includes an MCP server for AI agent integration.
  Open source, secure, and production-ready.
brand: azure
metadata:
  title: Data API builder documentation
  description: >
    Data API builder generates secure REST and GraphQL endpoints over your database.
    It supports SQL Server, Azure SQL, Azure Cosmos DB, PostgreSQL, MySQL, and Azure SQL Data Warehouse.
    Use the built-in SQL MCP server to connect AI agents to your data.
  author: seesharprun
  ms.author: sidandrews
  ms.reviewer: jerrynixon
  ms.service: data-api-builder
  ms.topic: hub-page
  ms.date: 03/29/2026

